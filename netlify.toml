# Netlify build settings (base directory = frontend in UI, or use base below).
[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

# SPA + API proxy redirects are written to dist/_redirects at build time
# (see frontend/scripts/write-netlify-redirects.mjs).
# Set BACKEND_PROXY_URL in Netlify env (e.g. https://your-api.onrender.com).
